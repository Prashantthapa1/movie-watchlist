<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen justify-center items-center bg-gray-100">
    <div class="w-full max-w-md mx-4 bg-white rounded-lg shadow-lg p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Login</h2>
        <form class="flex flex-col space-y-4">
            <div class="flex flex-col">
                <label for="username" class="text-gray-700 text-sm font-medium mb-1">Username or Email</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter username or email..." 
                    class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" 
                    required 
                />
            </div>
            <div class="flex flex-col">
                <label for="password" class="text-gray-700 text-sm font-medium mb-1">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter password..." 
                    class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" 
                    required 
                />
            </div>
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <input 
                        type="checkbox" 
                        id="remember" 
                        name="remember" 
                        class="h-4 w-4 text-blue-500 focus:ring-blue-500 border-gray-300 rounded"
                    />
                    <label for="remember" class="text-gray-600 text-sm ml-2">Remember Me</label>
                </div>
                <a href="#" class="text-blue-500 text-sm hover:underline">Forgot Password?</a>
            </div>
            <button 
                type="submit" 
                class="bg-blue-500 text-white font-semibold rounded-md p-3 hover:bg-blue-600 transition duration-200"
            >
                Login
            </button>
        </form>
        <hr class="my-4 border-gray-200">
        <div class="flex justify-end items-center">
            <p class="text-gray-600 text-sm mr-2">Don't have an account?</p>
            <a href="#" class="text-blue-500 text-sm hover:underline">Register Here</a>
        </div>
    </div>
</body>
</html>
