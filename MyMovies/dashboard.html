<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Movies</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100">

<!-- header section -->
<header class="flex justify-between items-center bg-gradient-to-r from-blue-500 via-pink-400 to-indigo-400 text-white px-3 py-5">
  <h2 class="font-bold text-2xl">My Movies</h2>

  <!-- Desktop nav -->
  <nav class="hidden md:flex gap-4 items-center [&>li>a]:p-1 [&>li>a:hover]:text-pink-300 list-none">
    <li><a href="#">Home</a></li>
    <li><a href="#">Movies</a></li>
    <li><a href="#">Favorites</a></li>
    <li><a href="#">Watched</a></li>
    <!-- Profile -->
    <p class="p-1 mx-2 border rounded-full bg-white text-black w-8 h-8 flex items-center justify-center">PT</p>
  </nav>

  <!-- Hamburger button (mobile only) -->
  <button class="md:hidden block focus:outline-none text-2xl" id="menu-btn">
    ☰
  </button>
</header>

<!-- Mobile dropdown -->
<div class="hidden flex-col bg-gradient-to-r from-blue-500 via-pink-400 to-indigo-400 text-white p-4 md:hidden" id="mobile-menu">
  <a href="#" class="py-2 hover:text-pink-300">Home</a>
  <a href="#" class="py-2 hover:text-pink-300">Movies</a>
  <a href="#" class="py-2 hover:text-pink-300">Favorites</a>
  <a href="#" class="py-2 hover:text-pink-300">Watched</a>
  <!-- Profile in mobile too -->
  <p class="mt-3 p-2 border rounded-full bg-white text-black w-10 h-10 flex items-center justify-center">PT</p>
</div>

<!-- stats cards -->
<section class="flex flex-wrap gap-4 justify-center mt-4 text-center px-4">
  <div class="transition-transform hover:-translate-y-1 bg-white p-10 rounded-md mb-5 w-[90%] sm:w-[48%] md:w-[30%]">
    <span class="text-gray-600 text-5xl">5</span>
    <p class="text-gray-800 mt-5">Movies Watched</p>
  </div>

  <div class="transition-transform hover:-translate-y-1 bg-white p-10 rounded-md mb-5 w-[90%] sm:w-[48%] md:w-[30%]">
    <span class="text-gray-600 text-5xl">5</span>
    <p class="text-gray-800 mt-5">My Coins</p>
  </div>

  <div class="transition-transform hover:-translate-y-1 bg-white p-10 rounded-md mb-5 w-[90%] sm:w-[48%] md:w-[30%]">
    <span class="text-gray-600 text-5xl">5</span>
    <p class="text-gray-800 mt-5">Favorites</p>
  </div>
</section>

<!-- Movies section -->
<section class="mx-2">
  <h1 class="font-semibold text-2xl">Movies</h1>

  <!-- movies cards -->
  <div class="flex flex-wrap gap-5 py-4">
    <div class="movie-card bg-white shadow-lg rounded-lg hover:scale-105 transition duration-300 ease-in-out w-full sm:w-[48%] lg:w-[30%]">
      <div class="mb-2">
        <img src="images/cat.png" alt="movie name">
        <h3 class="ml-2">Movie Name</h3>
        <p class="text-gray-700 ml-2">description</p>
      </div>  
      <hr>
      <div class="flex gap-3 mt-3 p-2">
        <button class="flex-1 bg-pink-300 hover:bg-pink-400 px-4 py-2 rounded-md transition duration-200">
          Add to Favorites
        </button>
        <button class="flex-1 bg-pink-300 hover:bg-pink-400 px-4 py-2 rounded-md transition duration-200">
          Watch Movie
        </button>
      </div>
    </div>
    <!-- copy more movie cards -->
  </div>

  <div class="flex justify-center mt-3">
    <button class="bg-[#FF6666] px-4 py-3 rounded-md hover:shadow-lg hover:bg-[#F44336]">View All Movies</button>
  </div>
</section>

<footer class="flex justify-center mt-5 p-3 text-gray-700">All rights reserved</footer>

<script>
  const btn = document.getElementById("menu-btn");
  const mobileMenu = document.getElementById("mobile-menu");

  btn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
  });
</script>
</body>
</html>
